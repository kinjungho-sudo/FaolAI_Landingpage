<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공고마당 — Foal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f8f7ff; color: #111; -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid #f0edf8; padding: 0 32px;
    }
    .nav-inner {
      max-width: 1200px; width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: -0.05em; text-decoration: none; color: #111; }
    .logo span { color: #6B3CF7; }
    .nav-links { display: flex; gap: 24px; }
    .nav-link { font-size: 14px; color: #666; text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .nav-link:hover { color: #6B3CF7; }
    .nav-link.active { color: #6B3CF7; font-weight: 800; }
    .nav-btn {
      padding: 9px 22px; background: #6B3CF7; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .nav-btn:hover { background: #5428E0; }

    /* ── Hero ── */
    .page-hero {
      background: linear-gradient(135deg, #1a0e3d 0%, #0B0D14 100%);
      padding: 60px 32px 48px; text-align: center;
    }
    .hero-label {
      font-size: 12px; font-weight: 800; color: #A78BFF;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
    }
    .hero-h1 { font-size: 36px; font-weight: 900; color: #fff; line-height: 1.25; margin-bottom: 14px; }
    .hero-sub { font-size: 16px; color: rgba(255,255,255,0.5); }

    /* ── Main ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 40px 32px 80px; }

    /* ── Controls ── */
    .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #aaa; pointer-events: none; }
    .search-input {
      width: 100%; padding: 14px 18px 14px 46px;
      border: 1.5px solid #E8E3FF; border-radius: 12px;
      font-size: 15px; font-family: inherit; outline: none;
      background: #fff; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { border-color: #6B3CF7; box-shadow: 0 0 0 3px rgba(107,60,247,0.1); }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-tab {
      padding: 8px 18px; border-radius: 100px;
      border: 1.5px solid #E8E3FF; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s; background: #fff; color: #555;
      font-family: inherit;
    }
    .filter-tab.active { background: #6B3CF7; border-color: #6B3CF7; color: #fff; }
    .filter-tab:hover:not(.active) { border-color: #A78BFF; color: #6B3CF7; }

    /* ── Status ── */
    .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .live-label { font-size: 13px; color: #888; display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; flex-shrink: 0; animation: pd 2s infinite; }
    @keyframes pd { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .live-dot.error { background: #F97316; }
    .count-label { font-size: 13px; color: #888; font-weight: 700; }

    /* ── Grid ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

    /* ── Card ── */
    .ann-card {
      background: #fff; border-radius: 16px; border: 1.5px solid #EDEAF8;
      overflow: hidden; transition: all 0.2s; cursor: pointer;
    }
    .ann-card:hover { border-color: #C4B0FA; box-shadow: 0 8px 32px rgba(107,60,247,0.1); transform: translateY(-2px); }
    .ann-card.expanded { border-color: #6B3CF7; box-shadow: 0 8px 32px rgba(107,60,247,0.15); }
    .card-top { padding: 22px 22px 16px; }
    .card-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .cat-tag { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 100px; }
    .cat-예비창업 { background: #EDE9FE; color: #6B3CF7; }
    .cat-초기창업 { background: #FEF3C7; color: #D97706; }
    .cat-재도전   { background: #FEE2E2; color: #DC2626; }
    .cat-청년     { background: #D1FAE5; color: #059669; }
    .cat-기술창업 { background: #DBEAFE; color: #2563EB; }
    .card-title { font-size: 15px; font-weight: 800; color: #111; line-height: 1.45; margin-bottom: 8px; }
    .card-org { font-size: 12px; color: #999; margin-bottom: 14px; }
    .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .meta-item { background: #f8f7ff; border-radius: 8px; padding: 9px 12px; }
    .meta-label { font-size: 10px; font-weight: 800; color: #A78BFF; margin-bottom: 3px; }
    .meta-value { font-size: 12px; font-weight: 700; color: #111; }
    .card-footer { padding: 12px 22px; border-top: 1px solid #f3f0fb; display: flex; justify-content: space-between; align-items: center; }
    .dday { font-size: 12px; font-weight: 800; }
    .dday.urgent { color: #DC2626; }
    .dday.soon   { color: #D97706; }
    .dday.ok     { color: #059669; }
    .dday.closed { color: #bbb; }
    .expand-hint { font-size: 12px; color: #A78BFF; font-weight: 700; }

    /* ── Detail ── */
    .card-detail { border-top: 1px solid #EDEAF8; padding: 0 22px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s; }
    .card-detail.open { max-height: 600px; padding: 20px 22px; }
    .detail-row { margin-bottom: 14px; }
    .detail-label { font-size: 11px; font-weight: 800; color: #A78BFF; margin-bottom: 5px; }
    .detail-value { font-size: 13px; color: #444; line-height: 1.7; white-space: pre-wrap; }
    .detail-link {
      display: inline-block; margin-top: 14px; padding: 10px 22px;
      background: #6B3CF7; color: #fff; border-radius: 9px;
      font-size: 13px; font-weight: 800; text-decoration: none; transition: background 0.2s;
    }
    .detail-link:hover { background: #5428E0; }

    /* ── Loading / Empty ── */
    .loading { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E8E3FF; border-top-color: #6B3CF7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 14px; color: #888; }
    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; color: #555; font-weight: 800; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: #999; }

    @media (max-width: 768px) {
      .page-hero { padding: 40px 20px 32px; }
      .hero-h1 { font-size: 26px; }
      .main { padding: 28px 20px 60px; }
      .card-grid { grid-template-columns: 1fr; }
      .nav { padding: 0 20px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="images/Logo.png" alt="Foal AI" style="height:32px;width:auto;" onerror="this.style.display='none'">Foal<span>AI</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">홈</a>
      <a href="announcements.html" class="nav-link active">공고마당</a>
      <a href="guide.html" class="nav-link">사업계획서 작성가이드</a>
    </div>
    <a href="index.html#modal" class="nav-btn" onclick="history.back()">관심 등록하기</a>
  </div>
</nav>

<div class="page-hero">
  <div class="hero-label">실시간 정부 지원 공고</div>
  <h1 class="hero-h1">창업자를 위한<br/>지원 공고 모음</h1>
  <p class="hero-sub">공고는 매일 업데이트 됩니다</p>
</div>

<div class="main">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="키워드로 검색 (예: 예비창업, 서울, 온라인)…" />
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-cat="전체">전체</button>
      <button class="filter-tab" data-cat="예비창업">예비창업</button>
      <button class="filter-tab" data-cat="초기창업">초기창업</button>
      <button class="filter-tab" data-cat="재도전">재도전</button>
      <button class="filter-tab" data-cat="청년">청년</button>
      <button class="filter-tab" data-cat="기술창업">기술창업</button>
    </div>
  </div>

  <div class="status-bar">
    <span class="live-label"><span class="live-dot" id="liveDot"></span><span id="sourceLabel">공고 불러오는 중…</span></span>
    <span class="count-label" id="countLabel"></span>
  </div>

  <div class="card-grid" id="cardGrid">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-txt">창업 지원 공고를 불러오는 중입니다…</div>
    </div>
  </div>
</div>

<script>
/* ── helpers ─────────────────────────────── */
function extractTag(block, tag) {
  const m = block.match(new RegExp('<' + tag + '(?:\\s[^>]*)?>([\\s\\S]*?)<\\/' + tag + '>', 'i'));
  return m ? m[1].replace(/<!\[CDATA\[|\]\]>/g, '').trim() : '';
}
function extractAllBlocks(xml, tag) {
  const re = new RegExp('<' + tag + '(?:\\s[^>]*)?>([\\s\\S]*?)<\\/' + tag + '>', 'gi');
  const out = []; let m;
  while ((m = re.exec(xml)) !== null) out.push(m[0]);
  return out;
}
function stripHtml(h) {
  return h.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/\s{2,}/g,' ').trim();
}
function inferCategory(title, desc) {
  const t = title + desc, cats = [];
  if (/예비창업|예비 창업/.test(t)) cats.push('예비창업');
  if (/초기창업|초기 창업|업력\s*[1-3]년/.test(t)) cats.push('초기창업');
  if (/재도전|폐업/.test(t)) cats.push('재도전');
  if (/청년|만\s*[23]?\d세|대학생/.test(t)) cats.push('청년');
  if (/기술|R&D|딥테크|팁스|TIPS/.test(t)) cats.push('기술창업');
  return cats.length ? cats : ['예비창업'];
}
function inferAmount(desc) {
  const m = desc.match(/(?:최대|최고|지원금액[^\d]*)?(\d[\d,]*(?:\.\d+)?)\s*만원/);
  if (m) return '최대 ' + m[1] + '만원';
  const m2 = desc.match(/(?:최대|최고)?(\d[\d,]*(?:\.\d+)?)\s*억원/);
  if (m2) return '최대 ' + m2[1] + '억원';
  return '-';
}
function inferOrg(desc) {
  const m = desc.match(/(?:주관기관|지원기관|운영기관)\s*[:\s]\s*([^\n<&]{2,20})/);
  if (m) return m[1].trim().replace(/[.\s]+$/,'');
  if (/창업진흥원/.test(desc)) return '중소벤처기업부 · 창업진흥원';
  if (/중소기업진흥|중진공/.test(desc)) return '중소벤처기업부 · 중소기업진흥공단';
  if (/소상공인/.test(desc)) return '소상공인시장진흥공단';
  if (/TIPS|팁스/.test(desc)) return '중소벤처기업부 · TIPS운영사';
  return '창업진흥원';
}
function inferDeadline(desc, pubDate) {
  const rx = /(?:접수기간|신청기간|공고기간|모집기간)[^\d]*(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})[^~\d]+~[^~\d]*(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/;
  const rm = desc.match(rx);
  if (rm) {
    const endDate = rm[4]+'-'+rm[5].padStart(2,'0')+'-'+rm[6].padStart(2,'0');
    return { label: rm[4]+'.'+rm[5]+'.'+rm[6], date: endDate };
  }
  if (pubDate) {
    try {
      const base = new Date(pubDate);
      base.setDate(base.getDate()+30);
      const y=base.getFullYear(), mo=base.getMonth()+1, d=base.getDate();
      return { label: y+'년 '+mo+'월 (예정)', date: y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0') };
    } catch(e) {}
  }
  return { label:'공고 확인 필요', date:'2099-12-31' };
}
function parseXml(xml) {
  return extractAllBlocks(xml,'item').map((block,i)=>{
    const title = extractTag(block,'title');
    const link  = extractTag(block,'link') || extractTag(block,'guid');
    const desc  = stripHtml(extractTag(block,'description'));
    const pubDate = extractTag(block,'pubDate');
    const dl = inferDeadline(desc, pubDate);
    return { id:'biz-'+i, title, org:inferOrg(desc), category:inferCategory(title,desc),
      amount:inferAmount(desc), deadline:dl.label, deadlineDate:dl.date,
      description:desc.slice(0,500), url:link||'https://www.bizinfo.go.kr' };
  }).filter(a=>a.title.length>0).slice(0,40);
}
function dday(dateStr) {
  if (!dateStr || dateStr==='2099-12-31') return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const end=new Date(dateStr); end.setHours(0,0,0,0);
  return Math.round((end-today)/86400000);
}
function ddayHtml(dateStr) {
  const d=dday(dateStr);
  if (d===null) return '<span class="dday ok">확인 필요</span>';
  if (d<0)  return '<span class="dday closed">마감</span>';
  if (d===0) return '<span class="dday urgent">D-Day!</span>';
  if (d<=7)  return '<span class="dday urgent">D-'+d+'</span>';
  if (d<=30) return '<span class="dday soon">D-'+d+'</span>';
  return '<span class="dday ok">D-'+d+'</span>';
}

/* ── state ───────────────────────────────── */
let allData = [], activeCategory = '전체', searchQuery = '';

/* ── render ──────────────────────────────── */
function render() {
  let data = allData;
  if (activeCategory !== '전체') data = data.filter(a=>a.category.includes(activeCategory));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(a=>
      a.title.toLowerCase().includes(q) ||
      a.org.toLowerCase().includes(q) ||
      a.description.toLowerCase().includes(q)
    );
  }
  document.getElementById('countLabel').textContent = data.length+'개 공고';
  const grid = document.getElementById('cardGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">검색 결과가 없습니다</div><div class="empty-sub">다른 키워드나 카테고리를 선택해보세요</div></div>';
    return;
  }
  grid.innerHTML = data.map(a=>{
    const cats = a.category.map(c=>'<span class="cat-tag cat-'+c+'">'+c+'</span>').join('');
    return '<div class="ann-card" id="card-'+a.id+'" onclick="toggleCard(\''+a.id+'\')">'
      +'<div class="card-top">'
        +'<div class="card-cats">'+cats+'</div>'
        +'<div class="card-title">'+a.title+'</div>'
        +'<div class="card-org">'+a.org+'</div>'
        +'<div class="card-meta">'
          +'<div class="meta-item"><div class="meta-label">지원 금액</div><div class="meta-value">'+a.amount+'</div></div>'
          +'<div class="meta-item"><div class="meta-label">마감일</div><div class="meta-value">'+a.deadline+'</div></div>'
        +'</div>'
      +'</div>'
      +'<div class="card-footer">'+ddayHtml(a.deadlineDate)+'<span class="expand-hint">상세 보기 ↓</span></div>'
      +'<div class="card-detail" id="detail-'+a.id+'">'
        +'<div class="detail-row"><div class="detail-label">공고 내용</div><div class="detail-value">'+a.description+'</div></div>'
        +'<a class="detail-link" href="'+a.url+'" target="_blank" rel="noopener">공고 원문 보기 →</a>'
      +'</div>'
    +'</div>';
  }).join('');
}

function toggleCard(id) {
  const card   = document.getElementById('card-'+id);
  const detail = document.getElementById('detail-'+id);
  const wasOpen = detail.classList.contains('open');
  document.querySelectorAll('.card-detail.open').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.ann-card.expanded').forEach(c=>c.classList.remove('expanded'));
  document.querySelectorAll('.expand-hint').forEach(e=>e.textContent='상세 보기 ↓');
  if (!wasOpen) {
    detail.classList.add('open');
    card.classList.add('expanded');
    card.querySelector('.expand-hint').textContent='접기 ↑';
  }
}

/* ── fetch ───────────────────────────────── */
const RSS = 'https://www.bizinfo.go.kr/uss/rss/bizSupportInfo.do?feedsId=PMAS0040';
const PROXIES = [
  u => 'https://api.allorigins.win/get?url='+encodeURIComponent(u),
  u => 'https://corsproxy.io/?'+encodeURIComponent(u),
];
async function tryProxy(proxyFn) {
  const res = await fetch(proxyFn(RSS), { signal: AbortSignal.timeout(12000) });
  if (!res.ok) throw new Error('HTTP '+res.status);
  const json = await res.json();
  const xml = json.contents || (typeof json === 'string' ? json : null);
  if (!xml) throw new Error('No XML content');
  return parseXml(xml);
}

// ※ 아래는 RSS 연결 실패 시 표시되는 참고용 샘플 공고입니다.
// 실제 공고는 bizinfo.go.kr 및 k-startup.go.kr에서 확인하세요.
const FALLBACK = [
  { id:'f1', title:'2026년 예비창업패키지 모집 공고 (마감)', org:'중소벤처기업부 · 창업진흥원', category:['예비창업'], amount:'최대 1,000만원', deadline:'2026.03.24', deadlineDate:'2026-03-24', description:'2026년도 예비창업패키지는 3월 24일 접수 마감되었습니다. 다음 공고를 위해 k-startup.go.kr을 즐겨찾기 해두세요.', url:'https://www.k-startup.go.kr' },

async function load() {
  for (const proxyFn of PROXIES) {
    try {
      const data = await tryProxy(proxyFn);
      if (data.length > 0) {
        allData = data;
        document.getElementById('sourceLabel').textContent = '실시간 공고 (bizinfo.go.kr)';
        document.getElementById('liveDot').classList.remove('error');
        render(); return;
      }
    } catch(e) { /* try next proxy */ }
  }
  allData = FALLBACK;
  document.getElementById('sourceLabel').textContent = '샘플 공고 표시 중 (네트워크 연결 확인 필요)';
  document.getElementById('liveDot').classList.add('error');
  render();
}

/* ── events ──────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.getElementById('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  activeCategory = tab.dataset.cat;
  render();
});

load();
</script>
