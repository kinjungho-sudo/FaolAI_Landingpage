name: 공고 데이터 크롤링

on:
  schedule:
    # 매주 월요일 23:00 KST (= 14:00 UTC, KST = UTC+9)
    - cron: '0 14 * * 1'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml python-dateutil

      - name: 크롤러 실행
        run: python scripts/crawl_announcements.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/announcements.json
          git diff --staged --quiet || git commit -m "chore: 공고 데이터 업데이트 [$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')]"
          git push
